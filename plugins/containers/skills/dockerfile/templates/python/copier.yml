_min_copier_version: "9.0.0"
_answers_file: .copier-answers.yml
_envops:
  trim_blocks: true
  lstrip_blocks: true

app_name:
  type: str
  help: Application name (used for labels and binary name)

python_version:
  type: str
  default: "3.14"
  help: Python version (major.minor only, e.g. 3.14)

port:
  type: int
  default: 8000
  help: Port the application listens on

project_type:
  type: str
  default: service
  help: Project type determines available entrypoint commands
  choices:
    "Service (API, web app, worker)": service
    "Library (package, SDK, CLI tool)": library

app_module:
  type: str
  default: "app.main:app"
  help: >
    For services: ASGI module:attribute (e.g. app.main:app).
    For libraries: leave default or set to main module path.

uses_uv:
  type: bool
  default: true
  help: Use UV for package management (recommended)
