_min_copier_version: "9.0.0"
_answers_file: .copier-answers.yml
_envops:
  trim_blocks: true
  lstrip_blocks: true
_templates_suffix: .jinja

project_name:
  type: str
  help: Project name (lowercase, hyphens for spaces)
  validator: "{% if not project_name %}Required{% endif %}"

description:
  type: str
  help: Short project description
  default: ""

author_name:
  type: str
  help: Your name
  default: ""

author_email:
  type: str
  help: Your email
  default: ""

python_version:
  type: str
  help: Minimum Python version
  default: "3.14"

project_type:
  type: str
  default: service
  help: Project type determines dependencies and scripts
  choices:
    "Service (API, web app, worker)": service
    "Library (package, SDK)": library
    "CLI tool": cli

cli_command_name:
  type: str
  help: CLI command name
  default: "{{ project_name }}"
  when: "{{ project_type == 'cli' }}"

app_module:
  type: str
  help: "ASGI module:attribute for services (e.g. app.main:app)"
  default: "{{ project_name | replace('-', '_') }}.main:app"
  when: "{{ project_type == 'service' }}"

port:
  type: int
  help: Port for the service
  default: 8000
  when: "{{ project_type == 'service' }}"

license:
  type: str
  help: License
  default: MIT
  choices:
    - MIT
    - Apache-2.0
    - GPL-3.0
    - BSD-3-Clause

line_length:
  type: int
  help: Ruff/Black line length
  default: 100
