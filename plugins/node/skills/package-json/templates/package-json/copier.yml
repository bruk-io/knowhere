_min_copier_version: "9.0.0"
_answers_file: .copier-answers.yml
_envops:
  trim_blocks: true
  lstrip_blocks: true
_templates_suffix: .jinja

project_name:
  type: str
  help: Package name (lowercase, hyphens)
  validator: "{% if not project_name %}Required{% endif %}"

description:
  type: str
  help: Short project description
  default: ""

author_name:
  type: str
  help: Your name
  default: ""

license:
  type: str
  help: License
  default: MIT
  choices:
    - MIT
    - Apache-2.0
    - GPL-3.0
    - BSD-3-Clause

project_type:
  type: str
  default: service
  help: Project type determines scripts and dependencies
  choices:
    "Service (API, web app, worker)": service
    "Library (package, SDK)": library

package_manager:
  type: str
  default: npm
  help: Package manager
  choices:
    - npm
    - pnpm
    - yarn

node_version:
  type: str
  default: "22"
  help: Minimum Node.js version

port:
  type: int
  help: Port for the service
  default: 3000
  when: "{{ project_type == 'service' }}"
